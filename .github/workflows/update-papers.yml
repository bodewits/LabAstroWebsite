name: Update recent papers

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Refresh NASA ADS papers
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
        run: node scripts/update-papers.mjs
      - name: Commit updated papers
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update recent ADS papers"
          file_pattern: data/papers.json data/papers.js
